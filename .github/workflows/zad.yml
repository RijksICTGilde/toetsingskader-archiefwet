name: Deploy to ZAD

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/rijksictgilde/toetsingskader-archiefwet

jobs:
  build:
    if: github.event.action != 'closed' && github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push container images to ghcr.io
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        # Hybride tagging om K8s mutable-tag caching te omzeilen:
        # - PR push: dubbele tag :pr-{n} (alias) + :pr-{n}-{sha} (immutable).
        #   Deploy gebruikt de SHA-variant zodat K8s elke commit een nieuwe
        #   digest ziet en de pod garandeerd herstart.
        # - Main push: alleen :main-{sha} (al immutable per commit).
        run: |
          SHA_SHORT="${GITHUB_SHA:0:7}"
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "TAGS=${{ env.IMAGE }}:main-${{ github.sha }}" >> "$GITHUB_ENV"
          else
            PR="${{ github.event.number }}"
            echo "TAGS=${{ env.IMAGE }}:pr-${PR},${{ env.IMAGE }}:pr-${PR}-${SHA_SHORT}" >> "$GITHUB_ENV"
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.TAGS }}

  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.user.type != 'Bot'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: pr-${{ github.event.pull_request.number }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Compute SHA-tagged image
        id: img
        run: echo "tag=pr-${{ github.event.number }}-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Deploy to ZAD
        id: deploy
        uses: RijksICTGilde/zad-actions/deploy@v4
        with:
          api-key: ${{ secrets.ZAD_API_KEY }}
          project-id: toets-hn7
          deployment-name: pr-${{ github.event.pull_request.number }}
          component: frontend
          # SHA-suffixed tag forceert K8s om elke commit als unieke image
          # te zien → pod restart per push (mutable :pr-N zou cached blijven).
          image: ${{ env.IMAGE }}:${{ steps.img.outputs.tag }}
          clone-from: production

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      deployments: write
      packages: write
    steps:
      - uses: RijksICTGilde/zad-actions/cleanup@v4
        with:
          api-key: ${{ secrets.ZAD_API_KEY }}
          project-id: toets-hn7
          deployment-name: pr-${{ github.event.pull_request.number }}
          delete-github-env: 'true'
          delete-github-deployments: 'true'
          delete-container: 'true'
          container-org: ${{ github.repository_owner }}
          container-name: ${{ github.event.repository.name }}
          container-tag: pr-${{ github.event.number }}
          github-admin-token: ${{ secrets.GITHUB_ADMIN_TOKEN }}

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy to ZAD
        id: deploy
        uses: RijksICTGilde/zad-actions/deploy@v4
        with:
          api-key: ${{ secrets.ZAD_API_KEY }}
          project-id: toets-hn7
          deployment-name: production
          component: frontend
          image: ${{ env.IMAGE }}:main-${{ github.sha }}
