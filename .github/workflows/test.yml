name: Test Hugo build

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: MOx/package-lock.json

      - name: Build MOx tokens
        run: |
          cd MOx
          npm ci
          npm run tokens

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          TZ: Europe/Amsterdam
        run: hugo --minify
