baseURL: https://frontend-production-toets-hn7.rig.prd1.gn2.quattro.rijksapps.nl/
languageCode: nl
defaultContentLanguage: nl
title: Toetsingskader Archiefwet

enableRobotsTXT: true
enableGitInfo: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: false
    extensions:
      table: true
      footnote: true
  tableOfContents:
    startLevel: 2
    endLevel: 4

params:
  feedback:
    email: toetsingskader@inspectie-oe.nl
  search:
    enable: true
    # priority_sections: hits in deze sections komen bovenaan, in deze volgorde
    priority_sections:
      - normen
  tagline: "Normen voor duurzame toegankelijkheid"
  page_banner:
    type: warning
    strong: "Let op:"
    text: "Dit is versie 0.8 van het toetsingskader. De inhoud is nog in ontwikkeling en kan wijzigen."
  footer:
    tagline: "De Inspectie ziet toe op de toegankelijkheid van overheidsinformatie en op de zorgvuldige omgang met erfgoed. Zij kijkt hoe de regels in de praktijk werken."
    links: "Zie ook"
    rechts: "Over deze site"

menus:
  main:
    - name: Home
      pageRef: /
      weight: 1
    - name: Over
      pageRef: /over
      weight: 5
    - name: Normen
      pageRef: /normen
      weight: 10

  footer-links:
    - name: Contact
      url: https://www.inspectie-oe.nl/service/contact
      weight: 1
    - name: RSS
      url: https://www.inspectie-oe.nl/service/rss
      weight: 2
    - name: Abonneren
      url: https://www.inspectie-oe.nl/abonneren/abonnementen
      weight: 3
    - name: Sitemap
      url: https://www.inspectie-oe.nl/sitemap
      weight: 4
    - name: Help
      url: https://www.inspectie-oe.nl/service/help
      weight: 5
    - name: Archief
      url: https://www.inspectie-oe.nl/service/archief
      weight: 6
    - name: Bereikbaarheid
      url: https://www.inspectie-oe.nl/bereikbaarheid
      weight: 7
    - name: Vacatures
      url: https://www.inspectie-oe.nl/de-inspectie-overheidsinformatie-en-erfgoed/vacatures
      weight: 8

  footer-rechts:
    - name: Copyright
      url: https://www.inspectie-oe.nl/service/copyright
      weight: 1
    - name: Privacy
      url: https://www.inspectie-oe.nl/service/privacy
      weight: 2
    - name: Cookies
      url: https://www.inspectie-oe.nl/service/cookies
      weight: 3
    - name: Toegankelijkheid
      url: https://www.inspectie-oe.nl/service/toegankelijkheid
      weight: 4
    - name: Kwetsbaarheid melden
      url: https://www.inspectie-oe.nl/service/kwetsbaarheid-melden
      weight: 5

module:
  imports:
    - path: github.com/RijksICTGilde/hugo-theme-ro
