baseURL: https://minbzk.github.io/toetsingskader-archiefwet/
title: Toetsingskader Archiefwet
languageCode: nl
defaultContentLanguage: nl

enableRobotsTXT: true

outputs:
  home:
    - HTML
    - RSS

markup:
  goldmark:
    renderer:
      unsafe: false
    extensions:
      table: true
      footnote: true
  tableOfContents:
    startLevel: 2
    endLevel: 4

menus:
  main:
    - name: Normen
      pageRef: /normen
      weight: 10

params:
  tagline: "Normen voor duurzame toegankelijkheid"
  search:
    enable: false              # toetsingskader is klein, search niet nodig in v0.1
  breadcrumbs:
    enable: true
  footer:
    tagline: "Eén Overheid. Voor iedereen!"
    variant: light
    colofon:
      enable: true
    description: "De Inspectie ziet toe op de toegankelijkheid van overheidsinformatie en op de zorgvuldige omgang met erfgoed."
  feedback:
    email: toetsingskader@inspectie-oe.nl

module:
  imports:
    - path: github.com/RijksICTGilde/hugo-theme-ro
