{{ define "main" }}
<section>
  <h1>{{ .Title }}</h1>

  {{ with .Params.intro }}
  <p class="intro">{{ . }}</p>
  {{ end }}

  <div class="card-grid card-grid--boxed">
    {{ range .Pages.ByWeight }}
    <article class="card">
      <header>
        <h2>
          <a href="{{ .RelPermalink }}">{{ .Params.norm_id }}. {{ .Params.norm_titel | default .Title }}</a>
        </h2>
      </header>
      {{ with .Params.kern }}
      <p>{{ . }}</p>
      {{ end }}
    </article>
    {{ end }}
  </div>

  {{ .Content }}
</section>
{{ end }}
