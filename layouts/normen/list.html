{{ define "main" }}
<div class="sidebar">
  <nav class="side-nav" aria-label="Normen">
    <ul>
      {{ range .Pages.ByWeight }}
      <li>
        <a href="{{ .RelPermalink }}">
          {{ .Params.norm_id }}. {{ .Params.norm_titel }}
        </a>
      </li>
      {{ end }}
    </ul>
  </nav>
</div>
<div class="normen-overzicht markup-content">
  <h1>{{ .Title }}</h1>

  {{ .Content }}

  <div class="card-grid">
    {{ range .Pages.ByWeight }}
    <article class="card norm-card-themed">
      <header>
        <span class="norm-badge">{{ .Params.norm_id }}</span>
        <h2>
          <a href="{{ .RelPermalink }}">{{ .Params.norm_titel }}</a>
        </h2>
      </header>
      {{ with .Params.kern }}
      <p>{{ . }}</p>
      {{ end }}
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
