{{ define "main" }}
<div class="sidebar">
  <nav class="side-nav" aria-label="Over het toetsingskader">
    <ul>
      <li>
        <a href="{{ .RelPermalink }}" aria-current="page">{{ .Params.card_title | default .Title }}</a>
        {{ if gt (len .Fragments.Headings) 0 }}
        <div class="side-nav-toc">{{ .TableOfContents }}</div>
        {{ end }}
      </li>
      {{ range .Pages.ByWeight }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Params.card_title | default .Title }}</a>
      </li>
      {{ end }}
    </ul>
  </nav>
</div>
<article class="page-article markup-content">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
</article>
{{ end }}
