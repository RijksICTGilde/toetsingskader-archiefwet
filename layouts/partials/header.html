{{/*
  Site header — local override
  Adds ministry name and organisation subtitle to logo
*/}}
<header>
  <figure class="logo">
    <a href="{{ "/" | relURL }}">
      <img
        src="{{ "assets/images/beeldmerk-rijksoverheid.svg" | relURL }}"
        alt="Logo Rijksoverheid — naar de homepage"
      >
    </a>
  </figure>
  {{ with .Site.Title }}<span class="site-title">{{ . }}</span>{{ end }}
  {{ with site.Menus.main }}
  <nav class="main-nav" aria-label="Hoofdnavigatie">
    <div class="main-nav-inner">
      <ul>
        {{ range . }}
        <li>
          <a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>
            {{ .Name }}
          </a>
        </li>
        {{ end }}
      </ul>
      {{- if site.Params.search.enable -}}
      <button type="button" class="search-trigger" aria-label="Zoeken openen (of druk /)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <span>Zoeken</span>
        <kbd>/</kbd>
      </button>
      {{- end -}}
    </div>
  </nav>
  {{ end }}
</header>
