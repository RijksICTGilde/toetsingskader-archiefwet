<header>
  <figure class="logo">
    <a href="{{ "/" | relURL }}">
      <img src="{{ "images/beeldmerk-rijksoverheid.svg" | relURL }}" alt="Naar de homepage van {{ site.Title }}">
    </a>
  </figure>
  {{ with site.Menus.main }}
  <nav class="main-nav">
    <ul>
      {{ range . }}
      <li><a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a></li>
      {{ end }}
    </ul>
  </nav>
  {{ end }}
</header>
