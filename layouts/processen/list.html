{{ define "main" }}
<div class="sidebar">
  <nav class="side-nav" aria-label="Processen">
    <ul>
      {{ range .Pages.ByWeight }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      </li>
      {{ end }}
    </ul>
  </nav>
</div>
<div class="processen-overzicht markup-content">
  <h1>{{ .Title }}</h1>
  {{ .Content }}

  <div class="card-grid">
    {{ range .Pages.ByWeight }}
    <article class="card">
      <header>
        <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      </header>
      {{ with .Params.kort }}<p>{{ . }}</p>{{ end }}
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
