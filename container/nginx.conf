worker_processes 1;
pid /tmp/nginx.pid;

# nginx-unprivileged logt naar stdout/stderr via de symlinks in de
# upstream image (/var/log/nginx/{access,error}.log → /dev/std{out,err}).

events {
    worker_connections 128;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Achter reverse proxy: geen absolute redirects (voorkomt lekken
    # van interne hostname/poort bij bv. trailing-slash redirects).
    absolute_redirect off;

    # Schrijfbare temp-paden voor non-root user.
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    # Verberg nginx-versie in Server-header en error-pages.
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers (basis overgenomen van ghcr.io/rijksictgilde/nginx-base).
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Schakel privacy-gevoelige browser-APIs expliciet uit.
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # CSP: strikte default voor statische site. Geen externe scripts,
        # styles of fonts; eigen assets via 'self'. data: voor inline
        # SVG-icons. frame-ancestors 'none' dekt X-Frame-Options.
        add_header Content-Security-Policy "default-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; img-src 'self' data:; frame-ancestors 'none'" always;

        # RFC 9116: standaard meldpunt voor security-onderzoekers,
        # gedelegeerd naar het Rijksbrede NCSC-kanaal.
        location = /.well-known/security.txt {
            return 301 https://www.ncsc.nl/.well-known/security.txt;
        }

        location / {
            try_files $uri $uri/index.html $uri/ =404;
        }

        error_page 404 /404.html;

        # Lange cache voor statische assets met fingerprint-naam.
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2)$ {
            expires 1y;
            access_log off;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }
    }
}
