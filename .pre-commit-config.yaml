repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
  - repo: local
    hooks:
      - id: validate-norms
        name: Validate norm front matter
        entry: python3 scripts/validate-norms.py
        language: system
        files: ^content/normen/
        types: [markdown]
