{{ define "main" }}
<div class="container">
  {{ partial "breadcrumbs.html" . }}
  <header class="page-header">
    <nldd-rich-text>
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p class="lead">{{ . }}</p>{{ end }}
      {{ with .Content }}{{ . }}{{ end }}
    </nldd-rich-text>
  </header>
  {{ if .Pages }}
    {{ partial "card-grid.html" (dict "pages" .Pages) }}
  {{ end }}
</div>
{{ end }}
